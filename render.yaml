services:
  - type: web
    name: AisteinAI-backend-2026
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_API_URL
        value: https://eleven.candexai.co.in
      - key: COMM_API_URL
        value: https://eleven.candexai.co.in
    healthCheckPath: /api/v1/health

